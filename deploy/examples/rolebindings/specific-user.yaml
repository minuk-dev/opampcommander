# Grants the Admin role to a specific user identified by their email address.
# This is a subject-based RoleBinding (no labelSelector).
#
# POST /api/v1/rolebindings
kind: RoleBinding
apiVersion: v1
metadata:
  namespace: "*"
  name: alice-admin
spec:
  roleRef:
    kind: Role
    name: Admin
  subject:
    kind: User
    name: alice@example.com   # user's primary email
