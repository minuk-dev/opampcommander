# User samples.

- label: Active user
  description: Email + username, isActive=true
  value:
    kind: User
    apiVersion: v1
    metadata:
      uid: ""
      createdAt: "{{now}}"
      updatedAt: "{{now}}"
    spec:
      email: alice@example.com
      username: alice
      isActive: true

- label: Inactive user
  description: Disabled account (cannot sign in)
  value:
    kind: User
    apiVersion: v1
    metadata:
      uid: ""
      createdAt: "{{now}}"
      updatedAt: "{{now}}"
    spec:
      email: legacy@example.com
      username: legacy-bot
      isActive: false
