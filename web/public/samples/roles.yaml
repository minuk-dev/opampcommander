    apiVersion: v1
    metadata:
      uid: ""
      createdAt: "{{now}}"
      updatedAt: "{{now}}"
    spec:
      displayName: Agent operator
      description: Manage agents and groups; read other resources
      isBuiltIn: false
      permissions:
