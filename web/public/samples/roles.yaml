        - agentgroup:UPDATE
        - agentgroup:DELETE
        - agentremoteconfig:GET
        - agentremoteconfig:LIST
        - agentremoteconfig:CREATE
        - agentremoteconfig:UPDATE
        - agentremoteconfig:DELETE
        - agentpackage:GET
        - agentpackage:LIST
        - agentpackage:CREATE
        - agentpackage:UPDATE
        - agentpackage:DELETE
