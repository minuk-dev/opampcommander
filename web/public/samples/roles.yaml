# Role samples. Edit freely — entries appear in the editor's "Load sample" menu.
# Keep "Default role (built-in floor)" in sync with
# pkg/apiserver/module/infrastructure/default_role.go (defaultRoleBuiltInPermissions).

- label: Default role (built-in floor)
  description: Reset spec.permissions to the read-only floor every user gets
  value:
    kind: Role
    apiVersion: v1
    metadata:
      uid: ""
      createdAt: "{{now}}"
      updatedAt: "{{now}}"
    spec:
      displayName: default
      description: Default role assigned to all new users on first login
      isBuiltIn: true
      permissions:
        - agent:GET
        - agent:LIST
        - agentgroup:GET
        - agentgroup:LIST
        - agentpackage:GET
        - agentpackage:LIST
        - agentremoteconfig:GET
        - agentremoteconfig:LIST
        - connection:GET
        - connection:LIST
        - rolebinding:GET

- label: Read-only viewer
  description: GET/LIST on every resource
  value:
    kind: Role
    apiVersion: v1
    metadata:
      uid: ""
      createdAt: "{{now}}"
      updatedAt: "{{now}}"
    spec:
      displayName: Viewer (custom)
      description: Read-only access to all resources
      isBuiltIn: false
      permissions:
        - agent:GET
        - agent:LIST
        - agentgroup:GET
        - agentgroup:LIST
        - agentpackage:GET
        - agentpackage:LIST
        - agentremoteconfig:GET
        - agentremoteconfig:LIST
        - certificate:GET
        - certificate:LIST
        - connection:GET
        - connection:LIST
        - rolebinding:GET
        - rolebinding:LIST
        - server:GET
        - server:LIST
        - user:GET
        - user:LIST
        - role:GET
        - role:LIST
        - permission:GET
        - permission:LIST

- label: Agent operator
  description: Full control over agents + agent groups, read elsewhere
  value:
