- label: Cluster admin (everything)
  description: "Wildcard: any action on any resource"
  value:
    kind: Role
    apiVersion: v1
    metadata:
      uid: ""
      createdAt: "{{now}}"
      updatedAt: "{{now}}"
    spec:
      displayName: Cluster admin
      description: Wildcard access to everything
      isBuiltIn: false
      permissions:
