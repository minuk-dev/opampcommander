# Enrich telemetry from pods running in Kubernetes with metadata
# (namespace, pod name, labels, ...). Run the collector as a DaemonSet with
# the necessary RBAC to read pods.
kind: AgentRemoteConfig
apiVersion: v1
metadata:
  name: kubernetes-attributes
  namespace: default
  attributes:
    platform: kubernetes
spec:
  contentType: text/yaml
  value: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      # Looks up pod metadata via the Kubernetes API. The pod's IP
      # (from connection or resource attributes) is used as the lookup key.
      k8sattributes:
        auth_type: serviceAccount
        passthrough: false
        extract:
          metadata:
            - k8s.namespace.name
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.deployment.name
            - k8s.node.name
            - k8s.container.name
          labels:
            - tag_name: app
              key: app
              from: pod
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.ip
          - sources:
              - from: connection
      resourcedetection:
        detectors: [env, system]
        timeout: 2s
      batch:
        timeout: 5s
    exporters:
      otlp:
        endpoint: otel-gateway.example.com:4317
        tls:
          insecure: false
    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [k8sattributes, resourcedetection, batch]
          exporters: [otlp]
        metrics:
          receivers: [otlp]
          processors: [k8sattributes, resourcedetection, batch]
          exporters: [otlp]
        logs:
          receivers: [otlp]
          processors: [k8sattributes, resourcedetection, batch]
          exporters: [otlp]
