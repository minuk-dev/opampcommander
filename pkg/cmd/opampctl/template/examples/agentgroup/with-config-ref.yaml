# AgentGroup that references a standalone AgentRemoteConfig by name.
# Use this when you want multiple AgentGroups to share the same config —
# update the AgentRemoteConfig once and every group picks up the change.
kind: AgentGroup
apiVersion: v1
metadata:
  namespace: default
  name: shared-config-group
  attributes: {}
spec:
  priority: 50
  selector:
    identifyingAttributes:
      service.name: my-service
    nonIdentifyingAttributes: {}
  agentConfig:
    # One or more remote configs are applied to every agent in the group.
    agentRemoteConfigs:
      # Reference a standalone AgentRemoteConfig resource in the same namespace.
      - agentRemoteConfigRef: shared-otel-config
