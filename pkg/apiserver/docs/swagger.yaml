definitions:
  Agent:
    properties:
      metadata:
        allOf:
        - $ref: '#/definitions/AgentMetadata'
        description: Metadata contains identifying information about the agent.
      spec:
        allOf:
        - $ref: '#/definitions/AgentSpec'
        description: Spec contains the desired configuration for the agent.
      status:
        allOf:
        - $ref: '#/definitions/AgentStatus'
        description: Status contains the observed state of the agent.
    type: object
  AgentAvailableComponents:
    properties:
      components:
        additionalProperties:
          $ref: '#/definitions/ComponentDetails'
        type: object
    type: object
  AgentComponentHealth:
    properties:
      componentsMap:
        additionalProperties:
          type: string
        type: object
      healthy:
        type: boolean
      lastError:
        type: string
      startTime:
        type: string
      status:
        type: string
      statusTime:
        type: string
    type: object
  AgentConditionStatus:
    enum:
    - "True"
    - "False"
    - Unknown
    type: string
    x-enum-varnames:
    - ConditionStatusTrue
    - ConditionStatusFalse
    - ConditionStatusUnknown
  AgentConfigFile:
    properties:
      body:
        type: string
      contentType:
        type: string
    type: object
  AgentConfigMap:
    properties:
      configMap:
        additionalProperties:
          $ref: '#/definitions/AgentConfigFile'
        type: object
    type: object
  AgentCustomCapabilities:
    properties:
      capabilities:
        items:
          type: string
        type: array
    type: object
  AgentDescription:
    properties:
      identifyingAttributes:
        additionalProperties:
          type: string
        description: IdentifyingAttributes are attributes that uniquely identify the
          agent.
        type: object
      nonIdentifyingAttributes:
        additionalProperties:
          type: string
        description: NonIdentifyingAttributes are attributes that do not uniquely
          identify the agent.
        type: object
    type: object
  AgentEffectiveConfig:
    properties:
      configMap:
        $ref: '#/definitions/AgentConfigMap'
    type: object
  AgentGroup:
    properties:
      metadata:
        $ref: '#/definitions/AgentGroupMetadata'
      spec:
        $ref: '#/definitions/AgentGroupSpec'
      status:
        $ref: '#/definitions/AgentGroupStatus'
    type: object
  AgentGroupMetadata:
    properties:
      attributes:
        $ref: '#/definitions/github_com_minuk-dev_opampcommander_api_v1.Attributes'
      createdAt:
        type: string
      deletedAt:
        type: string
      name:
        type: string
      namespace:
        type: string
    type: object
  AgentGroupSpec:
    properties:
      agentConfig:
        $ref: '#/definitions/github_com_minuk-dev_opampcommander_api_v1.AgentConfig'
      priority:
        type: integer
      selector:
        $ref: '#/definitions/github_com_minuk-dev_opampcommander_api_v1.AgentSelector'
    type: object
  AgentGroupStatus:
    properties:
      conditions:
        description: Conditions is a list of conditions that apply to the agent group.
        items:
          $ref: '#/definitions/Condition'
        type: array
      numAgents:
        description: NumAgents is the total number of agents in the agent group.
        type: integer
      numConnectedAgents:
        description: NumConnectedAgents is the number of connected agents in the agent
          group.
        type: integer
      numHealthyAgents:
        description: NumHealthyAgents is the number of healthy agents in the agent
          group.
        type: integer
      numNotConnectedAgents:
        description: NumNotConnectedAgents is the number of not connected agents in
          the agent group.
        type: integer
      numUnhealthyAgents:
        description: NumUnhealthyAgents is the number of unhealthy agents in the agent
          group.
        type: integer
    type: object
  AgentMetadata:
    properties:
      capabilities:
        description: Capabilities is a bitmask representing the capabilities of the
          agent.
        type: integer
      customCapabilities:
        allOf:
        - $ref: '#/definitions/AgentCustomCapabilities'
        description: CustomCapabilities is a map of custom capabilities for the agent.
      description:
        allOf:
        - $ref: '#/definitions/AgentDescription'
        description: Description is a human-readable description of the agent.
      instanceUid:
        description: InstanceUID is a unique identifier for the agent instance.
        type: string
      namespace:
        description: Namespace is the namespace the agent belongs to.
        type: string
    type: object
  AgentPackage:
    properties:
      metadata:
        $ref: '#/definitions/AgentPackageMetadata'
      spec:
        $ref: '#/definitions/AgentPackageSpec'
      status:
        $ref: '#/definitions/AgentPackageStatus'
    type: object
  AgentPackageMetadata:
    properties:
      attributes:
        $ref: '#/definitions/github_com_minuk-dev_opampcommander_api_v1.Attributes'
      createdAt:
        type: string
      deletedAt:
        type: string
      name:
        type: string
      namespace:
        type: string
    type: object
  AgentPackageSpec:
    properties:
      contentHash:
        items:
          type: integer
        type: array
      downloadUrl:
        type: string
      hash:
        items:
          type: integer
        type: array
      headers:
        additionalProperties:
          type: string
        type: object
      packageType:
        type: string
      signature:
        items:
          type: integer
        type: array
      version:
        type: string
    type: object
  AgentPackageStatus:
    properties:
      conditions:
        items:
          $ref: '#/definitions/Condition'
        type: array
    type: object
  AgentPackageStatusPackageEntry:
    properties:
      name:
        description: Name is the name of the package.
        type: string
    type: object
  AgentPackageStatuses:
    properties:
      errorMessage:
        type: string
      packages:
        additionalProperties:
          $ref: '#/definitions/AgentPackageStatusPackageEntry'
        type: object
      serverProvidedAllPackagesHash:
        type: string
    type: object
  AgentSpec:
    properties:
      connectionSettings:
        allOf:
        - $ref: '#/definitions/ConnectionSettings'
        description: ConnectionSettings contains connection settings for the agent.
      newInstanceUid:
        description: NewInstanceUID is a new instance UID to inform the agent of its
          new identity.
        type: string
      packagesAvailable:
        allOf:
        - $ref: '#/definitions/AgentSpecPackages'
        description: PackagesAvailable is the packages available for the agent to
          download.
      remoteConfig:
        allOf:
        - $ref: '#/definitions/AgentSpecRemoteConfig'
        description: RemoteConfig is the remote configuration of the agent.
      restartRequiredAt:
        description: |-
          RestartRequiredAt is the time when a restart was requested.
          If this time is after the agent's start time, the agent should be restarted.
        type: string
    type: object
  AgentSpecPackages:
    properties:
      packages:
        description: Packages is a list of package names available for the agent.
        items:
          type: string
        type: array
    type: object
  AgentSpecRemoteConfig:
    properties:
      remoteConfigNames:
        description: RemoteConfigNames is a list of remote config names applied to
          this agent.
        items:
          type: string
        type: array
    type: object
  AgentStatus:
    properties:
      availableComponents:
        allOf:
        - $ref: '#/definitions/AgentAvailableComponents'
        description: AvailableComponents lists components available on the agent.
      componentHealth:
        allOf:
        - $ref: '#/definitions/AgentComponentHealth'
        description: ComponentHealth is the health status of the agent's components.
      conditions:
        description: Conditions is a list of conditions that apply to the agent.
        items:
          $ref: '#/definitions/Condition'
        type: array
      connected:
        description: Connected indicates if the agent is currently connected.
        type: boolean
      connectionType:
        description: ConnectionType indicates the type of connection the agent is
          using.
        type: string
      effectiveConfig:
        allOf:
        - $ref: '#/definitions/AgentEffectiveConfig'
        description: EffectiveConfig is the effective configuration of the agent.
      lastReportedAt:
        description: LastReportedAt is the timestamp when the agent last reported
          its status.
        type: string
      packageStatuses:
        allOf:
        - $ref: '#/definitions/AgentPackageStatuses'
        description: PackageStatuses is a map of package statuses for the agent.
      sequenceNum:
        description: SequenceNum is the sequence number from the last AgentToServer
          message.
        type: integer
    type: object
  AssignRoleRequest:
    properties:
      assignedBy:
        description: AssignedBy is the ID of the user performing the assignment.
        type: string
      roleId:
        description: RoleID is the ID of the role to assign.
        type: string
      userId:
        description: UserID is the ID of the user to assign the role to.
        type: string
    type: object
  AuthnTokenResponse:
    properties:
      token:
        description: Token is the authentication token.
        type: string
    type: object
  Certificate:
    properties:
      apiVersion:
        description: APIVersion is the version of the API.
        type: string
      kind:
        description: Kind is the type of the resource.
        type: string
      metadata:
        allOf:
        - $ref: '#/definitions/CertificateMetadata'
        description: Metadata contains the metadata of the certificate.
      spec:
        allOf:
        - $ref: '#/definitions/CertificateSpec'
        description: Spec contains the specification of the certificate.
      status:
        allOf:
        - $ref: '#/definitions/CertificateStatus'
        description: Status contains the status of the certificate.
    type: object
  CertificateMetadata:
    properties:
      attributes:
        allOf:
        - $ref: '#/definitions/github_com_minuk-dev_opampcommander_api_v1.Attributes'
        description: Attributes are optional key-value pairs for the certificate.
      createdAt:
        description: CreatedAt is the timestamp when the certificate was created.
        type: string
      deletedAt:
        description: |-
          DeletedAt is the timestamp when the certificate was soft deleted.
          If nil, the certificate is not deleted.
        type: string
      name:
        description: Name is the unique name of the certificate.
        type: string
      namespace:
        description: Namespace is the namespace the certificate belongs to.
        type: string
    type: object
  CertificateSpec:
    properties:
      caCert:
        description: CaCert is the PEM-encoded CA certificate.
        type: string
      cert:
        description: Cert is the PEM-encoded certificate.
        type: string
      privateKey:
        description: PrivateKey is the PEM-encoded private key.
        type: string
    type: object
  CertificateStatus:
    properties:
      conditions:
        description: Conditions contains the conditions of the certificate.
        items:
          $ref: '#/definitions/Condition'
        type: array
    type: object
  CheckPermissionRequest:
    properties:
      action:
        description: Action is the action to check access for.
        type: string
      resource:
        description: Resource is the resource to check access for.
        type: string
      userId:
        description: UserID is the ID of the user to check.
        type: string
    type: object
  CheckPermissionResponse:
    properties:
      allowed:
        description: Allowed indicates whether the user has the permission.
        type: boolean
    type: object
  ComponentDetails:
    properties:
      type:
        type: string
      version:
        type: string
    type: object
  Condition:
    properties:
      lastTransitionTime:
        type: string
      message:
        type: string
      reason:
        type: string
      status:
        $ref: '#/definitions/AgentConditionStatus'
      type:
        $ref: '#/definitions/ConditionType'
    type: object
  ConditionType:
    enum:
    - Created
    - Updated
    - Deleted
    - Connected
    - Healthy
    - Configured
    - Registered
    type: string
    x-enum-varnames:
    - ConditionTypeCreated
    - ConditionTypeUpdated
    - ConditionTypeDeleted
    - ConditionTypeConnected
    - ConditionTypeHealthy
    - ConditionTypeConfigured
    - ConditionTypeRegistered
  Connection:
    properties:
      alive:
        description: Alive indicates whether the connection is currently alive.
        type: boolean
      id:
        description: ID is the unique identifier of the connection.
        type: string
      instanceUid:
        description: InstanceUID is the unique identifier of the agent instance.
        type: string
      lastCommunicatedAt:
        description: LastCommunicatedAt is the timestamp of the last communication
          with the agent.
        type: string
      namespace:
        description: Namespace is the namespace the connection belongs to.
        type: string
      type:
        description: Type is the type of connection (e.g., "http", "websocket").
        type: string
    type: object
  ConnectionSettings:
    properties:
      opamp:
        allOf:
        - $ref: '#/definitions/OpAMPConnectionSettings'
        description: OpAMP contains OpAMP server connection settings.
      otherConnections:
        additionalProperties:
          $ref: '#/definitions/OtherConnectionSettings'
        description: OtherConnections contains other connection settings mapped by
          name.
        type: object
      ownLogs:
        allOf:
        - $ref: '#/definitions/TelemetryConnectionSettings'
        description: OwnLogs contains own logs connection settings.
      ownMetrics:
        allOf:
        - $ref: '#/definitions/TelemetryConnectionSettings'
        description: OwnMetrics contains own metrics connection settings.
      ownTraces:
        allOf:
        - $ref: '#/definitions/TelemetryConnectionSettings'
        description: OwnTraces contains own traces connection settings.
    type: object
  DeviceAuthnTokenResponse:
    properties:
      deviceCode:
        description: DeviceCode
        type: string
      expiry:
        description: Expiry is when the device code and user code expire
        type: string
      interval:
        description: Interval is the duration in seconds that Poll should wait between
          requests
        type: integer
      userCode:
        description: UserCode is the code the user should enter at the verification
          uri
        type: string
      verificationUri:
        description: VerificationURI is where user should enter the user code
        type: string
      verificationUriComplete:
        description: |-
          VerificationURIComplete (if populated) includes the user code in the verification URI.
          This is typically shown to the user in non-textual form, such as a QR code.
        type: string
    type: object
  ErrorDetail:
    properties:
      location:
        type: string
      message:
        type: string
      value: {}
    type: object
  ErrorModel:
    properties:
      detail:
        description: |-
          Detail is a human-readable explanation specific to this occurrence of the problem.
          example: "Your request parameters didn't validate."
        type: string
      errors:
        description: Errors provides additional error details.
        items:
          $ref: '#/definitions/ErrorDetail'
        type: array
      instance:
        description: Instance is a URI reference that identifies the specific occurrence
          of the problem.
        type: string
      status:
        description: |-
          Status is the HTTP status code generated by the origin server for this occurrence of the problem.
          example: 400
        type: integer
      title:
        description: |-
          Title is a short, human-readable summary of the problem type.
          example: "Bad Request"
        type: string
      type:
        description: |-
          Type is a URI reference that identifies the problem type.
          example: "https://example.com/probs/out-of-credit"
        type: string
    type: object
  InfoResponse:
    properties:
      authenticated:
        type: boolean
      email:
        type: string
    type: object
  ListMeta:
    properties:
      continue:
        type: string
      remainingItemCount:
        type: integer
    type: object
  ListResponse-Agent:
    properties:
      apiVersion:
        type: string
      items:
        items:
          $ref: '#/definitions/Agent'
        type: array
      kind:
        type: string
      metadata:
        $ref: '#/definitions/ListMeta'
    type: object
  ListResponse-AgentGroup:
    properties:
      apiVersion:
        type: string
      items:
        items:
          $ref: '#/definitions/AgentGroup'
        type: array
      kind:
        type: string
      metadata:
        $ref: '#/definitions/ListMeta'
    type: object
  ListResponse-AgentPackage:
    properties:
      apiVersion:
        type: string
      items:
        items:
          $ref: '#/definitions/AgentPackage'
        type: array
      kind:
        type: string
      metadata:
        $ref: '#/definitions/ListMeta'
    type: object
  ListResponse-Certificate:
    properties:
      apiVersion:
        type: string
      items:
        items:
          $ref: '#/definitions/Certificate'
        type: array
      kind:
        type: string
      metadata:
        $ref: '#/definitions/ListMeta'
    type: object
  ListResponse-Connection:
    properties:
      apiVersion:
        type: string
      items:
        items:
          $ref: '#/definitions/Connection'
        type: array
      kind:
        type: string
      metadata:
        $ref: '#/definitions/ListMeta'
    type: object
  ListResponse-Permission:
    properties:
      apiVersion:
        type: string
      items:
        items:
          $ref: '#/definitions/Permission'
        type: array
      kind:
        type: string
      metadata:
        $ref: '#/definitions/ListMeta'
    type: object
  ListResponse-Role:
    properties:
      apiVersion:
        type: string
      items:
        items:
          $ref: '#/definitions/Role'
        type: array
      kind:
        type: string
      metadata:
        $ref: '#/definitions/ListMeta'
    type: object
  ListResponse-Server:
    properties:
      apiVersion:
        type: string
      items:
        items:
          $ref: '#/definitions/Server'
        type: array
      kind:
        type: string
      metadata:
        $ref: '#/definitions/ListMeta'
    type: object
  ListResponse-User:
    properties:
      apiVersion:
        type: string
      items:
        items:
          $ref: '#/definitions/User'
        type: array
      kind:
        type: string
      metadata:
        $ref: '#/definitions/ListMeta'
    type: object
  OAuth2AuthCodeURLResponse:
    properties:
      url:
        description: URL is the OAuth2 authorization URL.
        type: string
    type: object
  OpAMPConnectionSettings:
    properties:
      certificateName:
        description: CertificateName is the name of the certificate resource to use.
        type: string
      destinationEndpoint:
        description: DestinationEndpoint is the URL to connect to the OpAMP server.
        type: string
      headers:
        additionalProperties:
          items:
            type: string
          type: array
        description: Headers are HTTP headers to include in requests.
        type: object
    type: object
  OtherConnectionSettings:
    properties:
      certificateName:
        description: CertificateName is the name of the certificate resource to use.
        type: string
      destinationEndpoint:
        description: DestinationEndpoint is the URL to connect to.
        type: string
      headers:
        additionalProperties:
          items:
            type: string
          type: array
        description: Headers are HTTP headers to include in requests.
        type: object
    type: object
  Permission:
    properties:
      apiVersion:
        description: APIVersion is the version of the API.
        type: string
      kind:
        description: Kind is the type of the resource.
        type: string
      metadata:
        allOf:
        - $ref: '#/definitions/PermissionMetadata'
        description: Metadata contains the metadata of the permission.
      spec:
        allOf:
        - $ref: '#/definitions/PermissionSpec'
        description: Spec contains the specification of the permission.
      status:
        allOf:
        - $ref: '#/definitions/PermissionStatus'
        description: Status contains the status of the permission.
    type: object
  PermissionMetadata:
    properties:
      createdAt:
        description: CreatedAt is the timestamp when the permission was created.
        type: string
      deletedAt:
        description: DeletedAt is the timestamp when the permission was soft deleted.
        type: string
      uid:
        description: UID is the unique identifier of the permission.
        type: string
      updatedAt:
        description: UpdatedAt is the timestamp when the permission was last updated.
        type: string
    type: object
  PermissionSpec:
    properties:
      action:
        description: Action is the action this permission grants.
        type: string
      description:
        description: Description is the description of the permission.
        type: string
      isBuiltIn:
        description: IsBuiltIn indicates whether the permission is a built-in permission.
        type: boolean
      name:
        description: Name is the name of the permission (e.g., "agent:read").
        type: string
      resource:
        description: Resource is the resource this permission applies to.
        type: string
    type: object
  PermissionStatus:
    properties:
      conditions:
        description: Conditions contains the conditions of the permission.
        items:
          $ref: '#/definitions/Condition'
        type: array
    type: object
  PingResponse:
    properties:
      message:
        description: Message is the response message.
        type: string
    type: object
  Role:
    properties:
      apiVersion:
        description: APIVersion is the version of the API.
        type: string
      kind:
        description: Kind is the type of the resource.
        type: string
      metadata:
        allOf:
        - $ref: '#/definitions/RoleMetadata'
        description: Metadata contains the metadata of the role.
      spec:
        allOf:
        - $ref: '#/definitions/RoleSpec'
        description: Spec contains the specification of the role.
      status:
        allOf:
        - $ref: '#/definitions/RoleStatus'
        description: Status contains the status of the role.
    type: object
  RoleMetadata:
    properties:
      createdAt:
        description: CreatedAt is the timestamp when the role was created.
        type: string
      deletedAt:
        description: DeletedAt is the timestamp when the role was soft deleted.
        type: string
      uid:
        description: UID is the unique identifier of the role.
        type: string
      updatedAt:
        description: UpdatedAt is the timestamp when the role was last updated.
        type: string
    type: object
  RoleSpec:
    properties:
      description:
        description: Description is the description of the role.
        type: string
      displayName:
        description: DisplayName is the display name of the role.
        type: string
      isBuiltIn:
        description: IsBuiltIn indicates whether the role is a built-in role.
        type: boolean
      permissions:
        description: Permissions contains the permission names assigned to the role
          (e.g., "agent:read").
        items:
          type: string
        type: array
    type: object
  RoleStatus:
    properties:
      conditions:
        description: Conditions contains the conditions of the role.
        items:
          $ref: '#/definitions/Condition'
        type: array
    type: object
  Server:
    properties:
      conditions:
        items:
          $ref: '#/definitions/ServerCondition'
        type: array
      id:
        type: string
      lastHeartbeatAt:
        type: string
    type: object
  ServerCondition:
    properties:
      lastTransitionTime:
        type: string
      message:
        type: string
      reason:
        type: string
      status:
        $ref: '#/definitions/ServerConditionStatus'
      type:
        $ref: '#/definitions/ServerConditionType'
    type: object
  ServerConditionStatus:
    enum:
    - "True"
    - "False"
    - Unknown
    type: string
    x-enum-varnames:
    - ServerConditionStatusTrue
    - ServerConditionStatusFalse
    - ServerConditionStatusUnknown
  ServerConditionType:
    enum:
    - Registered
    - Alive
    type: string
    x-enum-varnames:
    - ServerConditionTypeRegistered
    - ServerConditionTypeAlive
  TelemetryConnectionSettings:
    properties:
      certificateName:
        description: CertificateName is the name of the certificate resource to use.
        type: string
      destinationEndpoint:
        description: DestinationEndpoint is the URL to send telemetry data to.
        type: string
      headers:
        additionalProperties:
          items:
            type: string
          type: array
        description: Headers are HTTP headers to include in requests.
        type: object
    type: object
  User:
    properties:
      apiVersion:
        description: APIVersion is the version of the API.
        type: string
      kind:
        description: Kind is the type of the resource.
        type: string
      metadata:
        allOf:
        - $ref: '#/definitions/UserMetadata'
        description: Metadata contains the metadata of the user.
      spec:
        allOf:
        - $ref: '#/definitions/UserSpec'
        description: Spec contains the specification of the user.
      status:
        allOf:
        - $ref: '#/definitions/UserStatus'
        description: Status contains the status of the user.
    type: object
  UserMetadata:
    properties:
      createdAt:
        description: CreatedAt is the timestamp when the user was created.
        type: string
      deletedAt:
        description: DeletedAt is the timestamp when the user was soft deleted.
        type: string
      uid:
        description: UID is the unique identifier of the user.
        type: string
      updatedAt:
        description: UpdatedAt is the timestamp when the user was last updated.
        type: string
    type: object
  UserProfileResponse:
    properties:
      permissions:
        description: Permissions contains the effective permissions for the user.
        items:
          $ref: '#/definitions/Permission'
        type: array
      roles:
        description: Roles contains the roles assigned to the user.
        items:
          $ref: '#/definitions/Role'
        type: array
      user:
        allOf:
        - $ref: '#/definitions/User'
        description: User contains the user information.
    type: object
  UserSpec:
    properties:
      email:
        description: Email is the email address of the user.
        type: string
      isActive:
        description: IsActive indicates whether the user is active.
        type: boolean
      username:
        description: Username is the username of the user.
        type: string
    type: object
  UserStatus:
    properties:
      conditions:
        description: Conditions contains the conditions of the user.
        items:
          $ref: '#/definitions/Condition'
        type: array
      roles:
        description: Roles contains the role IDs assigned to the user.
        items:
          type: string
        type: array
    type: object
  VersionInfo:
    properties:
      buildDate:
        type: string
      compiler:
        type: string
      gitCommit:
        type: string
      gitTreeState:
        type: string
      gitVersion:
        type: string
      goVersion:
        type: string
      major:
        type: string
      minor:
        type: string
      platform:
        type: string
    type: object
