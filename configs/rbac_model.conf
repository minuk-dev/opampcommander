# Domain-based RBAC model (Casbin RBAC with domains/tenants).
#
# sub = subject (user UUID string)
# dom = domain/namespace (namespace name or "*" for all namespaces)
# obj = resource type (e.g. "agent", "rolebinding")
# act = action (e.g. "GET", "LIST", "CREATE", "UPDATE", "DELETE")
#
# Role grouping: g(sub, role, domain)
#   g(sub, role, "default")  — user has role only in the "default" namespace
#   g(sub, role, "*")        — user has role in ALL namespaces (global assignment)
#
# Policy wildcards:
#   p.dom == "*" — the permission applies to every namespace (used for built-in role policies)
#   p.obj == "*" — the permission applies to every resource type
#   p.act == "*" — the permission applies to every action

[request_definition]
r = sub, dom, obj, act

[role_definition]
g = _, _, _

[policy_definition]
p = sub, dom, obj, act

[policy_effect]
e = some(where (p.eft == allow))

[matchers]
m = (g(r.sub, p.sub, r.dom) || g(r.sub, p.sub, "*")) && (p.dom == "*" || r.dom == p.dom) && (p.obj == "*" || r.obj == p.obj) && (p.act == "*" || r.act == p.act)
