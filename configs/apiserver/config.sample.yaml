address: localhost:8080
database:
  type: "mongodb"
  endpoints:
  - "mongodb://<user>:<password>@localhost:27017"
  connectTimeout: 10s
  databaseName: "opampcommander"
  ddlAuto: true
management:
  address: localhost:9090
  metric:
    enabled: true
    type: prometheus
    prometheus:
      path: /metrics
    opentelemetry: # unused when type is prometheus
      endpoint: "localhost:4317"
  log:
    level: "info"
    format: "json"
  trace:
    enabled: false
    endpoint: "localhost:4317"
auth:
  enabled: true
  admin:
    username: "admin"
    password: "admin_password"
  jwt:
    issuer: "opampcommander"
    expire: 5m
    refreshExpire: 168h
    secret: "your_jwt_secret"
    audience:
    - "opampcommander"
  type: "oauth2"
  oauth2:
    provider: github
    clientId: "your_client_id"
    clientSecret: "your_client_secret"
    redirectUri: "http://localhost:8080/auth/callback"
    # Additional hosts the /api/v1/auth/github/authcode endpoint will accept
    # as redirect_uri targets, on top of the always-allowed loopback hosts
    # (127.0.0.1, ::1, localhost). Set this to the deployed web UI host(s)
    # so browser logins from the dashboard work end-to-end.
    allowedRedirectHosts:
      - opampcommander.minuk.dev
    state: # to prevent CSRF attacks
      mode: jwt
      jwt:
        issuer: "opampcommander"
        expire: 5m
        secret: "your_jwt_secret"
        audience:
        - "opampcommander"
event:
  # enabled: Set to false for standalone mode (single server instance)
  # Set to true for distributed mode (multiple server instances with inter-server communication)
  enabled: false
  # type: Event protocol type - "inmemory" for standalone mode, "kafka" for distributed mode
  type: "inmemory"
  kafka:
    brokers:
      - "localhost:9092"
    topic: "prod.opampcommander.events"
