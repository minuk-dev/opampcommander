version: "2"
linters:
  default: all
  disable:
    - wsl
  exclusions:
    paths:
      - "pkg/apiserver/docs/docs.go" # Generated file for Swagger documentation
      - "web/*" # web is not managed go directory
    rules:
      - path: _test\.go
        linters:
          - funlen
          - varnamelen
          - exhaustruct
          - dupl
  settings:
    gosec:
      excludes:
        - G115 # integer overflow conversion — too noisy for guarded conversions
    gomoddirectives:
      replace-local: true
    funlen:
      ignore-comments: true
    cyclop:
      max-complexity: 15 # default: 10, but too strict
    varnamelen:
      ignore-type-assert-ok: true # default: false, but it's common in Go
      ignore-map-index-ok: true # default: false, but it's common in Go
      ignore-names:
        - wg # sync.WaitGroup
        - id # common abbreviation
    exhaustruct:
      exclude:
        - '.+/cobra\.Command$'
        - "go.mongodb.org/mongo-driver/v2/bson.Binary"
        # Protobuf-generated messages carry unexported state/sizeCache/unknownFields and are
        # never meant to be constructed exhaustively, so exclude the whole opamp-go protobufs
        # package instead of scattering //exhaustruct:ignore over every literal.
        - 'github\.com/open-telemetry/opamp-go/protobufs\..+'
        # Optional list/paging filters whose zero values are meaningful defaults;
        # call sites legitimately set only the fields they care about.
        - "github.com/minuk-dev/opampcommander/pkg/apiserver/domain/model.ListOptions"
        - "github.com/minuk-dev/opampcommander/pkg/apiserver/application/port.ListOptions"
    ireturn:
      allow:
        - generic
        - error
        - stdlib
        - empty
        - anon
        - Option$
        - Provider$ # Provider is commonly used
        - '.+/management\.HTTPHandler$'
        - '.+/trace\.Sampler$'
        - "github.com/minuk-dev/opampcommander/pkg/apiserver/domain/port.WebSocketConnection"
        - "github.com/minuk-dev/opampcommander/pkg/apiserver/domain/port.ServerEventSenderPort" # cannot handle without interface
        - "github.com/minuk-dev/opampcommander/pkg/apiserver/domain/port.ServerEventReceiverPort" # cannot handle without interface
        - "github.com/minuk-dev/opampcommander/pkg/apiserver/domain/agent/port.ServerEventSenderPort" # cannot handle without interface
        - "github.com/minuk-dev/opampcommander/pkg/apiserver/domain/agent/port.ServerEventReceiverPort" # cannot handle without interface
        - "github.com/minuk-dev/opampcommander/pkg/apiserver/domain/agent/port.EndpointMetricsQueryPort" # conditional impl (prometheus | noop)
        - "k8s.io/utils/clock.Timer"
        - "github.com/minuk-dev/opampcommander/pkg/utils/clock.Timer"
        # test
        - "github.com/testcontainers/testcontainers-go.Container"
    depguard:
      rules:
        main:
          files:
            - "!**/*_test.go" # Exclude test files
            - "!**/testutil/*" # Exclude testutil package
          allow:
            - $gostd
            - github.com/minuk-dev/opampcommander
            # Basic Frameworks
            - github.com/spf13/cobra
            - github.com/spf13/viper
            - github.com/spf13/afero
            - github.com/go-viper/mapstructure/v2
            - go.uber.org/fx
            - github.com/gin-gonic/gin
            # Basic Libraries
            - github.com/google/uuid
            # OpAMP
            - github.com/open-telemetry/opamp-go/protobufs
            - github.com/open-telemetry/opamp-go/server
            # Database
            - go.mongodb.org/mongo-driver/v2/mongo
            - go.mongodb.org/mongo-driver/v2/bson
            - go.mongodb.org/mongo-driver/v2/event
            - go.opentelemetry.io/contrib/instrumentation/go.mongodb.org/mongo-driver/v2/mongo/otelmongo
            # Eventing / Messaging
            - github.com/cloudevents/sdk-go/protocol/kafka_sarama/v2
            - github.com/cloudevents/sdk-go/v2
            - github.com/IBM/sarama
            # Utils
            - github.com/samber/lo
            - github.com/samber/mo
            - k8s.io/utils/clock
            - github.com/go-resty/resty/v2
            - gopkg.in/yaml.v3
            - github.com/puzpuzpuz/xsync/v3
            - github.com/spf13/pflag
            - github.com/jellydator/ttlcache/v3
            # authentication
            - golang.org/x/oauth2
            - golang.org/x/oauth2/github
            - github.com/golang-jwt/jwt/v5
            - github.com/google/go-github/v72/github
            - github.com/pkg/browser
            - golang.org/x/crypto/bcrypt
            - github.com/awnumar/memguard
            # RBAC
            - github.com/casbin/casbin/v2
            - github.com/casbin/mongodb-adapter/v4
            # documentation
            - github.com/swaggo/files
            - github.com/swaggo/gin-swagger
            # observability
            - github.com/samber/slog-gin
            - go.opentelemetry.io/otel
            - go.opentelemetry.io/contrib/instrumentation/github.com/gin-gonic/gin/otelgin
            - github.com/prometheus/client_golang/prometheus
            # metrics backend query client (endpoint throughput)
            - github.com/prometheus/client_golang/api
            - github.com/prometheus/client_golang/api/prometheus/v1
            - github.com/prometheus/common/model
            - go.opentelemetry.io/contrib/instrumentation/runtime
            - go.opentelemetry.io/contrib/instrumentation/net/http/otelhttp
            - github.com/cloudevents/sdk-go/observability/opentelemetry/v2/client
          deny:
            - pkg: github.com/minuk-dev/opampcommander/pkg/testutil
              desc: Do not use testutil in production code
        fx-composition-root:
          # FX is the composition root's concern only. Public packages (and any
          # code outside pkg/apiserver/internal) must stay FX-free so the wiring
          # can be swapped without rippling into business logic.
          files:
            - "!**/pkg/apiserver/internal/**"
            - "!**/*_test.go"
          deny:
            - pkg: go.uber.org/fx
              desc: Only pkg/apiserver/internal (the composition root) may import fx.
        adapter-primary-no-domain:
          # Primary (driving) adapters must reach the core only through the
          # application layer (application/port + api/v1), never the domain
          # directly. The messaging adapters are exempt: they implement domain
          # driven (out) ports, so depending on the domain is expected there.
          files:
            - "**/pkg/apiserver/adapter/primary/**"
            - "!**/pkg/apiserver/adapter/primary/messaging/**"
            - "!**/*_test.go"
          deny:
            - pkg: github.com/minuk-dev/opampcommander/pkg/apiserver/domain
              desc: Primary adapters must go through the application layer (application/port), not import the domain directly.
        test:
          files:
            - "**/*_test.go"
            - "**/testutil/*"
          allow:
            - $gostd
            - github.com/minuk-dev/opampcommander
            - github.com/spf13/afero
            - github.com/gin-gonic/gin
            - github.com/stretchr/testify/assert
            - github.com/stretchr/testify/require
            - github.com/stretchr/testify/mock
            - github.com/google/uuid
            - github.com/tidwall/gjson
            - gopkg.in/yaml.v3
            - gotest.tools/icmd
            - go.uber.org/goleak
            - github.com/open-telemetry/opamp-go/server/types
            - github.com/IBM/sarama
            - github.com/cloudevents/sdk-go/v2
            - github.com/cloudevents/sdk-go/protocol/kafka_sarama/v2
            - go.mongodb.org/mongo-driver/v2/mongo
            - go.mongodb.org/mongo-driver/v2/bson
            - github.com/open-telemetry/opamp-go/protobufs
            - github.com/testcontainers/testcontainers-go
            - github.com/testcontainers/testcontainers-go/modules/mongodb
            - github.com/testcontainers/testcontainers-go/wait
            - github.com/google/go-github/v72/github
            - github.com/golang-jwt/jwt/v5
formatters:
  enable:
    - gci
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/minuk-dev/opampcommander)
  exclusions:
    paths:
      - "web/*"
